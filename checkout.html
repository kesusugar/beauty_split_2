  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>購入手続き — LUMIÈRE</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --cream: #faf7f2; --warm-white: #fff9f4; --rose: #c4856a; --charcoal: #2a2220; --muted: #8a7b74; --border: #ede5dd; }
    body { font-family: 'Jost', sans-serif; background: var(--cream); color: var(--charcoal); min-height: 100vh; display: flex; flex-direction: column; }

    header { background: var(--warm-white); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; height: 72px; }
    .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; font-weight: 300; letter-spacing: 0.25em; color: var(--charcoal); text-decoration: none; }
    .logo span { color: var(--rose); font-style: italic; }

    /* STEPS */
    .breadcrumb { display: flex; justify-content: center; align-items: center; padding: 2.5rem 1rem 0; }
    .step { display: flex; flex-direction: column; align-items: center; gap: 0.45rem; }
    .step-num { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.68rem; font-weight: 500; border: 1.5px solid var(--border); background: var(--warm-white); color: var(--muted); }
    .step.active .step-num { background: var(--rose); border-color: var(--rose); color: #fff; }
    .step.done .step-num { background: var(--charcoal); border-color: var(--charcoal); color: #fff; }
    .step-label { font-size: 0.58rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    .step.active .step-label { color: var(--rose); font-weight: 500; }
    .step.done .step-label { color: var(--charcoal); }
    .step-line { width: 60px; height: 1px; background: var(--border); margin: 0 0.5rem 1.2rem; }
    @media (min-width: 400px) { .step-line { width: 88px; } }

    /* LAYOUT */
    .checkout-wrap { max-width: 780px; width: 100%; margin: 0 auto; padding: 2.5rem 1.5rem 5rem; flex: 1; }
    .page-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.6rem, 4vw, 2.2rem); font-weight: 300; margin-bottom: 0.3rem; }
    .page-sub { font-size: 0.8rem; font-weight: 300; color: var(--muted); margin-bottom: 0.9rem; }
    .demo-note { background: #fff8f0; border: 1px dashed #e8c5b0; border-radius: 2px; padding: 0.65rem 0.9rem; font-size: 0.7rem; color: var(--muted); line-height: 1.6; margin-bottom: 1.4rem; }

    .checkout-grid { display: grid; grid-template-columns: 1fr; gap: 1.5rem; }
    @media (min-width: 620px) { .checkout-grid { grid-template-columns: 1fr 300px; } }

    /* FORM */
    .form-section { background: var(--warm-white); border: 1px solid var(--border); border-radius: 2px; padding: 1.4rem; margin-bottom: 1rem; }
    .form-section h2 { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 400; margin-bottom: 1rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--border); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 0.75rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.28rem; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
    input { background: var(--cream); border: 1px solid var(--border); border-radius: 1px; padding: 0.62rem 0.75rem; font-family: 'Jost', sans-serif; font-size: 0.83rem; color: var(--charcoal); outline: none; transition: border-color 0.2s; width: 100%; }
    input:focus { border-color: var(--rose); }
    input::placeholder { color: #ccc; }

    /* ORDER SUMMARY */
    .summary-card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 2px; padding: 1.4rem; }
    @media (min-width: 620px) { .summary-card { position: sticky; top: 90px; } }
    .summary-card h2 { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 400; margin-bottom: 1rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--border); }
    .summary-item { display: flex; gap: 0.9rem; align-items: center; margin-bottom: 1rem; }
    .summary-item svg { width: 58px; height: 58px; min-width: 58px; border-radius: 1px; }
    .summary-item-info .name { font-family: 'Cormorant Garamond', serif; font-size: 0.95rem; }
    .summary-item-info .id { font-size: 0.6rem; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }
    .s-rows { border-top: 1px solid var(--border); padding-top: 0.85rem; }
    .s-row { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--muted); margin-bottom: 0.42rem; }
    .s-row.total { padding-top: 0.6rem; border-top: 1px solid var(--border); color: var(--charcoal); font-weight: 500; margin-bottom: 0; }
    .s-row.total .val { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 600; }

    /* BUTTONS */
    .btn-primary { display: block; width: 100%; background: var(--charcoal); color: var(--cream); border: none; padding: 1rem; font-family: 'Jost', sans-serif; font-size: 0.75rem; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; border-radius: 1px; text-align: center; transition: background 0.22s; margin-top: 1rem; }
    .btn-primary:hover { background: var(--rose); }
    .btn-secondary { display: block; width: 100%; background: transparent; color: var(--muted); border: 1px solid var(--border); padding: 0.85rem; font-family: 'Jost', sans-serif; font-size: 0.7rem; letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer; border-radius: 1px; text-align: center; transition: border-color 0.2s, color 0.2s; text-decoration: none; margin-top: 0.75rem; }
    .btn-secondary:hover { border-color: var(--charcoal); color: var(--charcoal); }

    footer { border-top: 1px solid var(--border); text-align: center; padding: 1.8rem; font-size: 0.67rem; letter-spacing: 0.08em; color: var(--muted); }
    @media (max-width: 560px) { .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
